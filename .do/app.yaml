# DigitalOcean — bitta Web Service (bot + scraper parallel, server.js)
# SECRET lar faqat App-Level Environment Variables da (dashboard).
# Settings → App-Level Environment Variables → Encrypt → Save → Deploy

name: karvon-bot
region: fra

services:
  - name: karvon-bot
    github:
      repo: otajonovm/karvon_bot
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    run_command: node server.js
    health_check:
      initial_delay_seconds: 45
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: TELEGRAM_USE_WSS
        value: "1"
        scope: RUN_TIME
      - key: SCRAPER_START_DELAY_SEC
        value: "60"
        scope: RUN_TIME
      - key: STRICT_FILTERS
        value: "0"
        scope: RUN_TIME
      - key: NOTIFY_ALL_DRIVERS
        value: "1"
        scope: RUN_TIME
      - key: SCRAPER_CONCURRENCY
        value: "6"
        scope: RUN_TIME
